 <!DOCTYPE html> <html lang="de"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Wer – Was – Bis wann | Digitaler Planer</title> <script src="https://cdn.tailwindcss.com"></script> <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"> <style> @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap'); body { font-family: 'Inter', sans-serif; } .checkbox-custom:checked + label { background-color: #007aff; border-color: #007aff; } @media print { .no-print { display: none; } } </style> </head> <body class="bg-[#f9f9fe] text-[#1d1d1f] min-h-screen"> <!-- Header --> <header class="bg-white border-b border-gray-200 sticky top-0 z-50 no-print"> <div class="max-w-[1100px] mx-auto px-6 h-16 flex justify-between items-center"> <div class="flex items-center gap-2 cursor-pointer" onclick="toggleSecretTeacherMode()"> <span class="text-2xl font-bold text-[#007aff]">doeltschi</span> <span class="text-xs bg-gray-100 px-2 py-1 rounded text-gray-500 uppercase tracking-widest font-semibold">Lokal Aktiv</span> </div> <nav class="flex gap-8"> <button class="text-[#007aff] font-bold border-b-2 border-[#007aff] pb-1">Schüler-Ansicht</button> <button onclick="window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'})" class="text-gray-500 hover:text-[#007aff] transition-colors">Anleitung</button> </nav> </div> </header> <main class="max-w-[1100px] mx-auto px-6 py-12"> <!-- Progress Steps (Visual only) --> <div class="grid grid-cols-4 gap-4 mb-16 no-print"> <div class="bg-white p-6 rounded-2xl border-2 border-[#007aff] flex flex-col items-center gap-2 shadow-sm"> <div class="w-10 h-10 rounded-full bg-[#007aff] text-white flex items-center justify-center font-bold">1</div> <span class="text-xs font-bold uppercase tracking-wider text-gray-400">Name wählen</span> </div> <div class="bg-white/50 p-6 rounded-2xl border border-gray-100 flex flex-col items-center gap-2"> <div class="w-10 h-10 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center font-bold">2</div> <span class="text-xs font-bold uppercase tracking-wider text-gray-400">Aufgaben prüfen</span> </div> <div class="bg-white/50 p-6 rounded-2xl border border-gray-100 flex flex-col items-center gap-2"> <div class="w-10 h-10 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center font-bold">3</div> <span class="text-xs font-bold uppercase tracking-wider text-gray-400">Erledigen</span> </div> <div class="bg-white/50 p-6 rounded-2xl border border-gray-100 flex flex-col items-center gap-2"> <div class="w-10 h-10 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center font-bold">4</div> <span class="text-xs font-bold uppercase tracking-wider text-gray-400">Eltern zeigen</span> </div> </div> <!-- Filter & Header --> <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-12 no-print"> <div class="w-full max-w-xs"> <label class="flex items-center gap-2 text-[#007aff] text-xs font-bold uppercase tracking-wider mb-2"> <span class="material-icons text-sm">person_search</span> Schüler auswählen </label> <select id="studentFilter" onchange="renderTasks()" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 outline-none focus:border-[#007aff] transition-all appearance-none shadow-sm cursor-pointer"> <option value="all">Alle Schüler / Ganze Klasse</option> </select> </div> <div class="text-right"> <h1 class="text-5xl font-black mb-1">Woche 14</h1> <p class="text-gray-400 font-medium">01.04.2024 – 05.04.2024</p> </div> </div> <!-- Task List --> <div id="taskList" class="space-y-6 min-h-[300px]"> <!-- Tasks will be injected here --> </div> <!-- Legend --> <div class="mt-16 bg-white p-8 rounded-3xl border border-gray-100 shadow-sm no-print"> <h3 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-6 pb-4 border-b border-gray-50">Farblegende der Fächer</h3> <div id="legendContainer" class="grid grid-cols-2 md:grid-cols-5 gap-y-4 gap-x-2"> <!-- Legend items injected here --> </div> </div> <!-- Parental Confirmation Section --> <div id="parentalSection" class="mt-12 p-8 border-2 border-dashed border-[#007aff] rounded-3xl bg-white no-print hidden"> <div class="flex items-center gap-3 text-[#007aff] mb-8"> <span class="material-icons text-3xl">verified_user</span> <h2 class="text-2xl font-bold">Bestätigung der Eltern</h2> </div> <div class="grid grid-cols-1 md:grid-cols-3 gap-6"> <div> <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Datum</label> <input type="date" id="parentDate" class="w-full bg-gray-50 border border-transparent rounded-xl px-4 py-4 outline-none focus:bg-white focus:border-[#007aff] transition-all"> </div> <div> <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Unterschrift (Name)</label> <input type="text" id="parentName" placeholder="Vorname Nachname" class="w-full bg-gray-50 border border-transparent rounded-xl px-4 py-4 outline-none focus:bg-white focus:border-[#007aff] transition-all"> </div> <div class="flex items-end"> <button onclick="saveParentalConfirmation()" class="w-full bg-gray-50 hover:bg-[#007aff] hover:text-white text-gray-400 font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2 group border border-transparent"> <div class="w-5 h-5 rounded-full border-2 border-current flex items-center justify-center group-hover:border-white"></div> Gesehen </button> </div> </div> </div> </main> <!-- Footer --> <footer class="bg-white border-t border-gray-100 py-12 mt-20 no-print"> <div class="max-w-[1100px] mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-8"> <div class="text-left"> <p class="text-xs font-bold text-gray-300 uppercase tracking-tighter">© 2024 doeltschi aufgabenplaner</p> <p class="text-[10px] text-gray-200 uppercase mt-1">Version 17 • Optimized</p> </div> <div class="flex gap-8 text-[10px] font-bold text-gray-400 uppercase tracking-widest"> <a href="#" class="hover:text-[#007aff]">Datenschutz</a> <a href="#" class="hover:text-[#007aff]">Impressum</a> <a href="#" class="hover:text-[#007aff]">Hilfe</a> </div> </div> </footer> <script> // Data Structure const STORAGE_KEY = "doeltschi-planner-v17"; let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { students: ["Lukas Müller", "Sophie Fischer", "Emma Weber"], tasks: [ { id: 1, who: "Lukas Müller", subject: "Deutsch", desc: "Arbeitsheft S. 42-43 lesen und Übung 4 bearbeiten.", due: "15.04.2024", status: "offen" }, { id: 2, who: "Lukas Müller", subject: "Mathematik", desc: "Einmaleins-Tabelle vervollständigen.", due: "16.04.2024", status: "erledigt" }, { id: 3, who: "Sophie Fischer", subject: "Deutsch", desc: "Diktat vorbereiten: \"Der Frühling kommt\".", due: "15.04.2024", status: "erledigt" } ], confirmations: {} }; const subjects = { "DEUTSCH": "#e11d48", "MATHEMATIK": "#007aff", "ENGLISCH": "#f59e0b", "FRANZÖSISCH": "#10b981", "RZG": "#f97316", "NT": "#06b6d4", "MUSIK": "#a855f7", "SPORT": "#d97706", "MEDIEN": "#64748b", "WAH": "#ef4444" }; // Initialize UI function init() { const filter = document.getElementById('studentFilter'); state.students.forEach(s => { const opt = document.createElement('option'); opt.value = s; opt.textContent = s; filter.appendChild(opt); }); const legend = document.getElementById('legendContainer'); Object.entries(subjects).forEach(([name, color]) => { legend.innerHTML += ` <div class="flex items-center gap-3"> <div class="w-3 h-3 rounded-full" style="background-color: ${color}"></div> <span class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">${name}</span> </div>`; }); renderTasks(); } function renderTasks() { const container = document.getElementById('taskList'); const selected = document.getElementById('studentFilter').value; const parental = document.getElementById('parentalSection'); container.innerHTML = ""; const filtered = selected === "all" ? state.tasks : state.tasks.filter(t => t.who === selected || t.who === "Ganze Klasse"); if (selected !== "all") { parental.classList.remove('hidden'); // Check if already confirmed if (state.confirmations[selected]) { parental.innerHTML = `<div class="text-center py-4 text-[#007aff] font-bold">Bestätigt am ${state.confirmations[selected].date} von ${state.confirmations[selected].name} ✓</div>`; } } else { parental.classList.add('hidden'); } filtered.forEach(task => { const isDone = task.status === "erledigt"; const color = subjects[task.subject.toUpperCase()] || "#64748b"; container.innerHTML += ` <div class="bg-white rounded-3xl border-l-4 p-8 flex items-center justify-between shadow-sm transition-all hover:shadow-md ${isDone ? 'opacity-60 border-gray-400' : ''}" style="border-left-color: ${isDone ? '#94a3b8' : color}"> <div class="grid grid-cols-1 md:grid-cols-4 gap-8 flex-grow"> <div> <p class="text-[10px] font-bold text-gray-300 uppercase tracking-widest mb-2">Wer</p> <h4 class="font-bold text-lg">${task.who}</h4> <span class="text-[9px] font-black uppercase px-3 py-1 rounded-full text-white mt-2 inline-block" style="background-color: ${color}">${task.subject}</span> </div> <div class="md:col-span-2"> <p class="text-[10px] font-bold text-gray-300 uppercase tracking-widest mb-2">Aufgabe</p> <p class="text-gray-500 leading-relaxed font-medium">${task.desc}</p> </div> <div class="text-right pr-8"> <p class="text-[10px] font-bold text-gray-300 uppercase tracking-widest mb-2">Bis</p> <p class="font-black text-xl">${task.due}</p> </div> </div> <div class="flex flex-col items-center gap-2"> <button onclick="toggleTask(${task.id})" class="group flex flex-col items-center gap-2"> <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center transition-all ${isDone ? 'bg-gray-400 border-gray-400 text-white' : 'border-gray-200 text-transparent group-hover:border-[#007aff]'}"> <span class="material-icons text-sm">check</span> </div> <span class="text-[9px] font-bold uppercase tracking-widest ${isDone ? 'text-gray-400' : 'text-gray-300'}">${task.status}</span> </button> </div> </div>`; }); } function toggleTask(id) { const task = state.tasks.find(t => t.id === id); if (task) { task.status = task.status === "offen" ? "erledigt" : "offen"; localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); renderTasks(); } } function saveParentalConfirmation() { const name = document.getElementById('parentName').value; const date = document.getElementById('parentDate').value; const selected = document.getElementById('studentFilter').value; if (name && date && selected !== "all") { state.confirmations[selected] = { name, date }; localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); renderTasks(); } else { alert("Bitte füllen Sie Name und Datum aus."); } } function toggleSecretTeacherMode() { const pw = prompt("Bitte Passwort eingeben:"); if (pw === "lehrer123") { alert("Lehrer-Modus aktiviert (Admin-Konsole wird geladen...)"); // Hier würde die Weiterleitung zum Lehrer-Dashboard erfolgen } } init(); </script> </body> </html> ```
