<!DOCTYPE html> <html lang="de"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>doeltschi | Digitaler Aufgabenplaner ULTIMATE</title> <script src="https://cdn.tailwindcss.com"></script> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"> <style> body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; margin: 0; padding: 0; } .card { background: white; border-radius: 1rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); } .btn-primary { background-color: #2563eb; color: white; transition: all 0.2s; } .btn-primary:hover { background-color: #1d4ed8; transform: translateY(-1px); } .tab-active { background-color: #eff6ff; color: #1e40af; border-left: 4px solid #2563eb; font-weight: 700; } @media print { .no-print { display: none !important; } .print-only { display: block !important; } } .loading-overlay { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.5s; } .hidden-loading { opacity: 0; pointer-events: none; } </style> </head> <body class="min-h-screen"> <div id="loading" class="loading-overlay"> <div class="text-center"> <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-blue-600 mx-auto mb-4"></div> <p class="text-slate-500 font-medium">Planer wird sicher geladen...</p> </div> </div> <div id="app" class="flex min-h-screen"> <!-- Sidebar --> <aside class="w-64 bg-white border-r border-slate-200 hidden lg:flex flex-col no-print"> <div class="p-6 border-b border-slate-100"> <h1 class="text-xl font-bold text-blue-600">doeltschi</h1> <p class="text-xs text-slate-500 uppercase tracking-wider font-semibold">Hausaufgaben Planer</p> </div> <nav class="flex-1 p-4 space-y-2"> <button onclick="setMode('student')" id="nav-student" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left hover:bg-slate-50 transition-colors"> <span class="text-lg">📅</span> Planer </button> <button onclick="setMode('teacher')" id="nav-teacher" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left hover:bg-slate-50 transition-colors"> <span class="text-lg">🔒</span> Lehrer-Modus </button> </nav> <div class="p-6 border-t border-slate-100"> <div class="flex items-center gap-3"> <div class="w-10 h-10 rounded-full bg-slate-200 overflow-hidden"> <img src="https://images.unsplash.com/photo-1544717297-fa95b3ee51f8?w=100&h=100&fit=crop" alt="Avatar"> </div> <div> <p class="text-sm font-bold">Klasse 4B</p> <p class="text-xs text-slate-500">Schuljahr 23/24</p> </div> </div> </div> </aside> <!-- Main Content --> <main class="flex-1 overflow-y-auto bg-slate-50/50"> <div id="content" class="max-w-5xl mx-auto p-4 md:p-8"> <!-- Dynamischer Inhalt --> </div> <footer class="max-w-5xl mx-auto px-8 py-8 border-t border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4 text-slate-500 text-sm no-print"> <p>© 2024 Wer – Was – Bis wann</p> <div class="flex gap-6"> <a href="#" class="hover:text-blue-600">Datenschutz</a> <a href="#" class="hover:text-blue-600">Impressum</a> <a href="#" class="hover:text-blue-600">Hilfe</a> </div> </footer> </main> </div> <script> // --- KONFIGURATION & STATE --- let currentMode = 'student'; let selectedStudent = 'Alle'; let tasks = []; let students = []; const STORAGE_KEY = 'doeltschi_planner_v10'; const PASSWORD = 'lehrer123'; // --- INITIALISIERUNG (BULLETPROOF) --- async function init() { try { console.log("Starte Initialisierung..."); // 1. Daten laden (Local First) const localData = localStorage.getItem(STORAGE_KEY); if (localData) { const parsed = JSON.parse(localData); tasks = parsed.tasks || []; students = parsed.students || []; console.log("Lokale Daten geladen."); } // 2. Mock Cloud Sync (Hier könnte eine API-Anfrage stehen) // Bei einem echten Sync-Fehler würde das 'catch' greifen. // 3. UI rendern render(); } catch (error) { console.error("Fehler beim Starten:", error); // Notfall-Daten tasks = tasks.length > 0 ? tasks : []; students = students.length > 0 ? students : []; render(); } finally { // Lade-Screen IMMER entfernen setTimeout(() => { document.getElementById('loading').classList.add('hidden-loading'); }, 300); } } // --- CORE LOGIK --- function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks, students })); render(); } function setMode(mode) { if (mode === 'teacher') { const pw = prompt("Bitte Lehrer-Passwort eingeben:"); if (pw !== PASSWORD) { alert("Falsches Passwort!"); return; } } currentMode = mode; render(); } // --- RENDER FUNKTIONEN --- function render() { const container = document.getElementById('content'); // Nav-Highlighting document.getElementById('nav-student').className = `w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left hover:bg-slate-50 transition-colors ${currentMode === 'student' ? 'tab-active' : ''}`; document.getElementById('nav-teacher').className = `w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left hover:bg-slate-50 transition-colors ${currentMode === 'teacher' ? 'tab-active' : ''}`; if (currentMode === 'student') { renderStudentView(container); } else { renderTeacherView(container); } } function renderStudentView(container) { let filteredTasks = selectedStudent === 'Alle' ? tasks : tasks.filter(t => t.who === selectedStudent || t.who === 'Ganze Klasse'); container.innerHTML = ` <div class="flex justify-between items-end mb-8 no-print"> <div> <h2 class="text-3xl font-bold mb-1">Schüleransicht</h2> <p class="text-slate-500">Deine aktuellen Aufgaben und Erledigungen.</p> </div> <div class="bg-white p-4 card min-w-[200px]"> <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Mein Name:</label> <select onchange="selectedStudent = this.value; render()" class="w-full bg-transparent font-bold focus:outline-none"> <option value="Alle">Alle anzeigen</option> ${students.map(s => `<option value="${s}" ${selectedStudent === s ? 'selected' : ''}>${s}</option>`).join('')} </select> </div> </div> <div class="card bg-white overflow-hidden mb-8"> <table class="w-full text-left border-collapse"> <thead> <tr class="bg-slate-50 border-b border-slate-200"> <th class="p-4 text-xs font-bold text-slate-400 uppercase">Status</th> <th class="p-4 text-xs font-bold text-slate-400 uppercase">Wer</th> <th class="p-4 text-xs font-bold text-slate-400 uppercase">Aufgabe</th> <th class="p-4 text-xs font-bold text-slate-400 uppercase">Termin</th> <th class="p-4 text-xs font-bold text-slate-400 uppercase text-right">Aktion</th> </tr> </thead> <tbody> ${filteredTasks.length === 0 ? `<tr><td colspan="5" class="p-12 text-center text-slate-400">Keine Aufgaben vorhanden.</td></tr>` : filteredTasks.map((t, i) => ` <tr class="border-b border-slate-100 hover:bg-slate-50/50"> <td class="p-4"> <div class="w-2 h-8 rounded-full ${t.status === 'done' ? 'bg-green-400' : 'bg-orange-400'}"></div> </td> <td class="p-4 font-bold text-slate-700">${t.who}</td> <td class="p-4 text-slate-600">${t.desc}</td> <td class="p-4 text-slate-500">${t.date}</td> <td class="p-4 text-right"> <button onclick="toggleTask(${tasks.indexOf(t)})" class="px-4 py-2 rounded-lg text-sm font-bold ${t.status === 'done' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-600'}"> ${t.status === 'done' ? '✓ Erledigt' : 'Offen'} </button> </td> </tr> `).join('')} </tbody> </table> </div> ${selectedStudent !== 'Alle' ? ` <div class="card p-8 border-dashed border-2 border-blue-200 bg-blue-50/30"> <h3 class="text-xl font-bold mb-4 flex items-center gap-2">🛡️ Bestätigung der Eltern</h3> <div class="grid grid-cols-1 md:grid-cols-3 gap-6"> <div> <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Datum:</label> <input type="text" value="${new Date().toLocaleDateString('de-CH')}" class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none"> </div> <div> <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Unterschrift (Name):</label> <input type="text" placeholder="Vorname Nachname" class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none"> </div> <div class="flex items-end"> <button class="w-full btn-primary p-3 rounded-xl font-bold">Bestätigen</button> </div> </div> </div> ` : ''} `; } function renderTeacherView(container) { container.innerHTML = ` <div class="flex justify-between items-center mb-8"> <div> <h2 class="text-3xl font-bold mb-1">Lehrer-Dashboard</h2> <p class="text-slate-500">Aufgaben verwalten und Fortschritt überwachen.</p> </div> <button onclick="printPlanner()" class="px-6 py-3 border border-slate-200 rounded-xl font-bold hover:bg-white transition-all flex items-center gap-2"> 🖨️ Drucken / PDF </button> </div> <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8"> <!-- Neue Aufgabe --> <div class="lg:col-span-2 card p-6"> <h3 class="font-bold mb-4">➕ Neue Aufgabe erstellen</h3> <div class="grid grid-cols-2 gap-4 mb-4"> <select id="t-who" class="p-3 rounded-xl border border-slate-200"> <option value="Ganze Klasse">Ganze Klasse</option> ${students.map(s => `<option value="${s}">${s}</option>`).join('')} </select> <input id="t-date" type="date" class="p-3 rounded-xl border border-slate-200"> </div> <textarea id="t-desc" placeholder="Was ist zu tun?" class="w-full p-3 rounded-xl border border-slate-200 mb-4 h-24"></textarea> <button onclick="addTask()" class="w-full btn-primary py-3 rounded-xl font-bold">Aufgabe zuweisen</button> </div> <!-- Klassenliste --> <div class="card p-6"> <h3 class="font-bold mb-4">👥 Klassenliste (${students.length})</h3> <div class="space-y-2 max-h-48 overflow-y-auto mb-4"> ${students.map((s, i) => ` <div class="flex justify-between items-center p-2 bg-slate-50 rounded-lg text-sm"> <span>${s}</span> <button onclick="removeStudent(${i})" class="text-red-400 hover:text-red-600">✕</button> </div> `).join('')} </div> <div class="flex gap-2"> <input id="new-student" type="text" placeholder="Name..." class="flex-1 p-2 rounded-lg border border-slate-200 text-sm"> <button onclick="addStudent()" class="px-4 py-2 btn-primary rounded-lg text-sm font-bold">Add</button> </div> <hr class="my-4"> <button onclick="importList()" class="w-full py-2 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold hover:bg-slate-200"> 📥 Liste importieren (.txt) </button> </div> </div> <div class="card overflow-hidden"> <div class="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center"> <h3 class="font-bold">Aktuelle Aufgabenliste</h3> <button onclick="tasks=[];saveData()" class="text-xs text-red-500 font-bold">Liste leeren</button> </div> <table class="w-full text-left"> <tbody class="divide-y divide-slate-100"> ${tasks.map((t, i) => ` <tr class="hover:bg-slate-50/50"> <td class="p-4 font-bold text-sm">${t.who}</td> <td class="p-4 text-sm">${t.desc}</td> <td class="p-4 text-sm text-slate-500">${t.date}</td> <td class="p-4 text-right"> <button onclick="tasks.splice(${i},1);saveData()" class="text-slate-300 hover:text-red-500">🗑️</button> </td> </tr> `).join('')} </tbody> </table> </div> `; } // --- AKTIONEN --- function toggleTask(index) { tasks[index].status = tasks[index].status === 'done' ? 'open' : 'done'; saveData(); } function addTask() { const who = document.getElementById('t-who').value; const desc = document.getElementById('t-desc').value; let date = document.getElementById('t-date').value; if (!desc) return; // Datum formatieren if (date) { const d = new Date(date); date = d.toLocaleDateString('de-CH'); } else { date = '-'; } tasks.push({ who, desc, date, status: 'open' }); document.getElementById('t-desc').value = ''; saveData(); } function addStudent() { const name = document.getElementById('new-student').value.trim(); if (name && !students.includes(name)) { students.push(name); document.getElementById('new-student').value = ''; saveData(); } } function removeStudent(index) { students.splice(index, 1); saveData(); } function importList() { const input = document.createElement('input'); input.type = 'file'; input.accept = '.txt'; input.onchange = e => { const file = e.target.files[0]; const reader = new FileReader(); reader.onload = event => { const content = event.target.result; const names = content.split(/[\n,]+/).map(n => n.trim()).filter(n => n); students = [...new Set([...students, ...names])]; saveData(); }; reader.readAsText(file); }; input.click(); } function printPlanner() { window.print(); } // Start init(); </script> </body> </html> ```
