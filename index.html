<!DOCTYPE html>

<html class="light" lang="de"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#adc6ff",
                        "tertiary-container": "#c64f00",
                        "on-background": "#1a1c1f",
                        "surface-container-low": "#f3f3f8",
                        "on-primary-fixed": "#001a41",
                        "outline-variant": "#c1c6d7",
                        "error-container": "#ffdad6",
                        "tertiary": "#9e3d00",
                        "surface-bright": "#f9f9fe",
                        "secondary-container": "#6664e4",
                        "inverse-surface": "#2e3034",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#ededf2",
                        "on-surface": "#1a1c1f",
                        "on-secondary-fixed": "#0c006a",
                        "surface-container-highest": "#e2e2e7",
                        "on-surface-variant": "#414755",
                        "on-error": "#ffffff",
                        "surface-container-high": "#e8e8ed",
                        "on-primary-fixed-variant": "#004493",
                        "background": "#f9f9fe",
                        "on-secondary-fixed-variant": "#3631b4",
                        "inverse-on-surface": "#f0f0f5",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#fffbff",
                        "primary-fixed-dim": "#adc6ff",
                        "tertiary-fixed": "#ffdbcc",
                        "on-primary-container": "#fefcff",
                        "on-tertiary-fixed-variant": "#7c2e00",
                        "secondary-fixed": "#e2dfff",
                        "outline": "#717786",
                        "primary-container": "#0070eb",
                        "surface-variant": "#e2e2e7",
                        "secondary-fixed-dim": "#c2c1ff",
                        "on-secondary-container": "#fffbff",
                        "tertiary-fixed-dim": "#ffb595",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "primary": "#0058bc",
                        "on-tertiary-fixed": "#351000",
                        "surface-tint": "#005bc1",
                        "surface-dim": "#d9dade",
                        "on-primary": "#ffffff",
                        "secondary": "#4c4aca",
                        "on-tertiary": "#ffffff",
                        "surface": "#f9f9fe",
                        "primary-fixed": "#d8e2ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "input-padding": "1rem",
                        "gutter": "1.5rem",
                        "stack-padding": "1.25rem",
                        "container-margin": "2rem"
                    },
                    "fontFamily": {
                        "h1": ["Inter"],
                        "h2": ["Inter"],
                        "h1-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "subject-tag": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "h1": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "h2": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "h1-mobile": ["26px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "subject-tag": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        @media print {
            body { background: white !important; }
            .no-print { display: none !important; }
            .print-container { width: 100% !important; max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .a4-page { 
                box-shadow: none !important; 
                margin: 0 !important; 
                border: none !important;
                page-break-after: always;
            }
        }
        .a4-page {
            width: 210mm;
            min-height: 297mm;
            padding: 15mm;
            margin: 2rem auto;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .student-card {
            border: 1px solid #717786; /* outline */
            break-inside: avoid;
        }
    </style>
</head>
<body class="bg-surface-container text-on-surface font-body-md">
<!-- Top Bar (No Print) -->
<header class="no-print bg-surface border-b border-outline-variant w-full h-16 flex items-center justify-between px-gutter sticky top-0 z-50">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary">print</span>
<h1 class="font-h2 text-h2">Druckansicht: Eltern-QR-Codes</h1>
</div>
<button class="bg-primary text-on-primary px-6 py-2 rounded-full font-bold flex items-center gap-2 hover:bg-primary-container transition-all active:scale-95" onclick="window.print()">
<span class="material-symbols-outlined">local_printshop</span>
            Jetzt drucken
        </button>
</header>
<main class="print-container">
<!-- A4 Page Container -->
<div class="a4-page">
<!-- Teacher/Class Info -->
<div class="mb-8 flex justify-between items-end border-b-2 border-primary pb-4">
<div>
<p class="font-label-caps text-label-caps text-primary uppercase">Wer – Was – Bis wann</p>
<h2 class="font-h1 text-h1 text-on-surface">Klasse 4b — Elternzugänge</h2>
</div>
<div class="text-right">
<p class="font-body-md text-on-surface-variant">Datum: 24. Mai 2024</p>
<p class="font-body-md text-on-surface-variant">Lehrperson: Hr. Schmidt</p>
</div>
</div>
<!-- Grid of Cards -->
<div class="grid grid-cols-2 gap-6">
<!-- Student Card Template (Loop-simulated) -->
<script>
                    const students = [
                        "Lena Meier", "Jonas Weber", "Sophie Keller", "Lukas Fischer",
                        "Mia Schneider", "Noah Wagner", "Emma Becker", "Leon Hoffmann",
                        "Mila Schäfer", "Ben Koch", "Ella Richter", "Paul Wolf"
                    ];

                    const renderCard = (name) => `
                        <div class="student-card p-6 rounded-lg bg-white relative flex flex-col justify-between h-[130mm]">
                            <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-primary rounded-l-lg"></div>
                            
                            <div>
                                <div class="flex justify-between items-start mb-4">
                                    <div class="font-label-caps text-label-caps text-primary">DÖLTSCHI HAUSAUFGABEN</div>
                                    <span class="material-symbols-outlined text-outline">verified</span>
                                </div>
                                
                                <h3 class="font-h2 text-h2 mb-1">Eltern-Zugang: Digitaler Planer</h3>
                                <p class="font-body-lg font-bold text-on-surface mb-6">${name}</p>
                            </div>

                            <div class="flex flex-col items-center gap-4 py-4">
                                <div class="border-2 border-dashed border-outline-variant p-2 rounded-xl">
                                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://wer-was-biswann.ch/parent/demo" 
                                         alt="QR Code für Elternzugang" 
                                         class="w-32 h-32"
                                         data-alt="A clean, high-contrast QR code centered on a white background. The QR code has rounded modules and a subtle blue accent in the center. It is surrounded by a minimal, light-gray dashed border to guide the user's eye. The overall aesthetic is professional, clear, and optimized for high-quality black and white printing with a modern corporate feel.">
                                </div>
                                <p class="text-center font-label-caps text-label-caps px-4 text-on-surface-variant">
                                    SCANNEN FÜR AKTUELLE HAUSAUFGABEN
                                </p>
                            </div>

                            <div class="mt-4 pt-4 border-t border-outline-variant">
                                <p class="text-[11px] leading-tight text-on-surface-variant">
                                    Scannen Sie diesen Code, um die Hausaufgaben Ihres Kindes zu sehen und zu bestätigen. Einmal scannen, immer aktuell. Keine App-Installation nötig.
                                </p>
                            </div>
                        </div>
                    `;

                    document.write(students.map(name => renderCard(name)).join(''));
                </script>
</div>
<!-- Footer for the page -->
<div class="mt-12 text-center border-t border-outline-variant pt-4">
<p class="font-label-caps text-label-caps text-outline">© 2024 Wer – Was – Bis wann — Support: hilfe@werwasbiswann.ch</p>
</div>
</div>
</main>
<!-- Micro-interaction for Print Preview -->
<script>
        // Smooth hover effect for cards in digital view
        document.querySelectorAll('.student-card').forEach(card => {
            card.addEventListener('mouseenter', () => {
                card.style.transform = 'translateY(-2px)';
                card.style.boxShadow = '0 10px 25px -5px rgba(0, 0, 0, 0.1)';
                card.style.transition = 'all 0.3s ease';
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'translateY(0)';
                card.style.boxShadow = 'none';
            });
        });
    </script>
</body></html>
