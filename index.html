<!DOCTYPE html> <html lang="de"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>doeltschi | Digitaler Aufgabenplaner</title> <script src="https://cdn.tailwindcss.com"></script> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"> <style> body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 0; } .container-custom { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; } .card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: all 0.2s; } .card:hover { border-color: #cbd5e1; } .nav-pill { padding: 0.6rem 1.2rem; border-radius: 9999px; font-weight: 600; font-size: 0.875rem; display: flex; items-center: center; gap: 0.5rem; transition: all 0.2s; border: none; cursor: pointer; } .nav-pill-active { background-color: #007aff; color: white; } .nav-pill-inactive { color: #64748b; background: transparent; } .nav-pill-inactive:hover { background-color: #f1f5f9; } .step-circle { width: 40px; height: 40px; border-radius: 50%; background: #eff6ff; color: #007aff; display: flex; align-items: center; justify-content: center; font-weight: 700; margin-bottom: 1rem; } .badge { padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; color: white; text-transform: uppercase; } @media print { .no-print { display: none !important; } } </style> </head> <body class="min-h-screen"> <!-- TOP NAVIGATION --> <header class="bg-white border-b border-slate-200 sticky top-0 z-50 no-print"> <div class="max-w-[1200px] mx-auto px-6 py-4 flex justify-between items-center"> <div class="flex items-center gap-2"> <h1 class="text-2xl font-bold text-slate-800 tracking-tight">doeltschi</h1> <span class="px-2 py-0.5 bg-slate-100 text-[10px] font-bold text-slate-500 rounded uppercase tracking-widest flex items-center gap-1"> <span class="w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></span> Lokal Aktiv </span> </div> <nav class="flex gap-2"> <button onclick="setMode('student')" id="btn-student" class="nav-pill nav-pill-active"> <span>👤</span> Schüler-Ansicht </button> <button onclick="setMode('teacher')" id="btn-teacher" class="nav-pill nav-pill-inactive"> <span>🔒</span> Lehrer-Bereich </button> </nav> </div> </header> <main id="app" class="container-custom"> <!-- Inhalt wird per JS geladen --> </main> <script> const STORAGE_KEY = 'doeltschi_classic_stable_v13'; const PASSWORD = 'lehrer123'; const subjects = { 'DE': { name: 'Deutsch', color: '#ef4444' }, 'MA': { name: 'Mathematik', color: '#3b82f6' }, 'E': { name: 'Englisch', color: '#f59e0b' }, 'F': { name: 'Französisch', color: '#22c55e' }, 'RZG': { name: 'RZG', color: '#f97316' }, 'NT': { name: 'NT', color: '#06b6d4' }, 'MU': { name: 'Musik', color: '#a855f7' }, 'BS': { name: 'Sport', color: '#fbbf24' }, 'MI': { name: 'Medien', color: '#64748b' }, 'WAH': { name: 'WAH', color: '#ef4444' } }; let currentMode = 'student'; let selectedStudent = 'Alle'; let tasks = []; let students = []; window.addEventListener('DOMContentLoaded', () => { const saved = localStorage.getItem(STORAGE_KEY); if (saved) { const data = JSON.parse(saved); tasks = data.tasks || []; students = data.students || []; } render(); }); function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks, students })); render(); } function setMode(mode) { if (mode === 'teacher') { const pw = prompt("Lehrer-Passwort eingeben (Standard: lehrer123):"); if (pw !== PASSWORD) return alert("Falsches Passwort!"); } currentMode = mode; render(); } function render() { const app = document.getElementById('app'); document.getElementById('btn-student').className = `nav-pill ${currentMode === 'student' ? 'nav-pill-active' : 'nav-pill-inactive'}`; document.getElementById('btn-teacher').className = `nav-pill ${currentMode === 'teacher' ? 'nav-pill-active' : 'nav-pill-inactive'}`; if (currentMode === 'student') renderStudentView(app); else renderTeacherView(app); } function renderLegend() { return ` <div class="card p-6 mt-8 no-print"> <h5 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Farblegende der Fächer</h5> <div class="flex flex-wrap gap-4"> ${Object.entries(subjects).map(([code, info]) => ` <div class="flex items-center gap-2"> <span class="w-3 h-3 rounded-full" style="background-color: ${info.color}"></span> <span class="text-[10px] font-bold text-slate-600 uppercase">${code}</span> <span class="text-[10px] text-slate-400">${info.name}</span> </div> `).join('')} </div> </div> `; } function renderStudentView(container) { let filtered = selectedStudent === 'Alle' ? tasks : tasks.filter(t => t.who === selectedStudent || t.who === 'Ganze Klasse'); container.innerHTML = ` <!-- STEPS --> <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-12 no-print"> <div class="card p-6 text-center"> <div class="step-circle mx-auto">1</div> <h4 class="font-bold text-sm mb-1 uppercase">Name wählen</h4> </div> <div class="card p-6 text-center"> <div class="step-circle mx-auto">2</div> <h4 class="font-bold text-sm mb-1 uppercase text-slate-300">Aufgaben prüfen</h4> </div> <div class="card p-6 text-center"> <div class="step-circle mx-auto">3</div> <h4 class="font-bold text-sm mb-1 uppercase text-slate-300">Erledigen</h4> </div> <div class="card p-6 text-center"> <div class="step-circle mx-auto">4</div> <h4 class="font-bold text-sm mb-1 uppercase text-slate-300">Eltern zeigen</h4> </div> </div> <!-- FILTER --> <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8 no-print px-4"> <div> <h6 class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-1">Schüler auswählen</h6> <select onchange="selectedStudent = this.value; render()" class="bg-transparent font-bold text-xl focus:outline-none cursor-pointer"> <option value="Alle">Alle Schüler</option> ${students.map(s => `<option value="${s}" ${selectedStudent === s ? 'selected' : ''}>${s}</option>`).join('')} </select> </div> <div class="text-right"> <h2 class="text-5xl font-extrabold tracking-tight">Woche 14</h2> <p class="text-slate-400 font-medium">01.04.2024 – 05.04.2024</p> </div> </div> <!-- LIST --> <div class="space-y-4 mb-12"> ${filtered.length === 0 ? `<div class="card p-12 text-center text-slate-400 italic">Keine Aufgaben vorhanden.</div>` : filtered.map((t, i) => ` <div class="card p-0 flex overflow-hidden border-l-4" style="border-left-color: ${subjects[t.subject]?.color || '#e2e8f0'}"> <div class="p-6 flex-1 grid grid-cols-1 md:grid-cols-4 gap-4 items-center"> <div> <span class="text-[9px] font-bold text-slate-400 uppercase block mb-1">Wer</span> <p class="font-bold text-slate-800">${t.who}</p> <span class="badge" style="background-color: ${subjects[t.subject]?.color}">${t.subject}</span> </div> <div class="md:col-span-2"> <span class="text-[9px] font-bold text-slate-400 uppercase block mb-1">Aufgabe</span> <p class="text-slate-600">${t.desc}</p> </div> <div class="text-right"> <span class="text-[9px] font-bold text-slate-400 uppercase block mb-1">Bis</span> <p class="font-bold text-slate-800">${t.date}</p> <button onclick="toggleTask(${tasks.indexOf(t)})" class="mt-2 flex items-center gap-2 ml-auto text-[10px] font-bold uppercase transition-all ${t.status === 'done' ? 'text-green-600' : 'text-slate-400'}"> <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center ${t.status === 'done' ? 'bg-green-500 border-green-500 text-white' : 'border-slate-200'}"> ${t.status === 'done' ? '✓' : ''} </div> ${t.status === 'done' ? 'Erledigt' : 'Offen'} </button> </div> </div> </div> `).join('')} </div> ${renderLegend()} <footer class="mt-16 text-center text-[10px] text-slate-400 no-print flex justify-between items-end border-t border-slate-100 pt-8 px-4"> <div class="text-left"> <p class="font-bold text-slate-600 mb-1">© 2024 DOELTSCHI AUFGABENPLANER</p> <p class="uppercase tracking-widest opacity-50">Version 13 • Farbcodes & Fächer</p> </div> <div class="flex gap-6 uppercase tracking-widest font-bold"> <a href="#" class="hover:text-slate-800">Datenschutz</a> <a href="#" class="hover:text-slate-800">Impressum</a> <a href="#" class="hover:text-slate-800">Hilfe</a> </div> </footer> `; } function renderTeacherView(container) { container.innerHTML = ` <div class="flex justify-between items-center mb-8 px-4"> <h2 class="text-3xl font-extrabold tracking-tight">Lehrer Dashboard</h2> <div class="flex gap-2"> <button onclick="window.print()" class="px-5 py-2.5 bg-white border rounded-xl font-bold text-sm shadow-sm hover:bg-slate-50 transition-all uppercase tracking-widest text-[10px]">Drucken / PDF</button> <button onclick="if(confirm('Alles löschen?')){tasks=[];saveData();}" class="px-5 py-2.5 bg-red-50 text-red-600 border border-red-100 rounded-xl font-bold text-sm hover:bg-red-100 transition-all uppercase tracking-widest text-[10px]">Liste leeren</button> </div> </div> <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12"> <div class="lg:col-span-2 card p-8"> <h3 class="font-bold text-lg mb-6 flex items-center gap-2">➕ Neue Aufgabe zuteilen</h3> <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4"> <div class="p-3 bg-slate-50 rounded-xl border border-slate-100"> <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1">Wer</label> <select id="t-who" class="w-full bg-transparent font-bold focus:outline-none text-sm"> <option value="Ganze Klasse">Ganze Klasse</option> ${students.map(s => `<option value="${s}">${s}</option>`).join('')} </select> </div> <div class="p-3 bg-slate-50 rounded-xl border border-slate-100"> <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1">Fach</label> <select id="t-subject" class="w-full bg-transparent font-bold focus:outline-none text-sm"> ${Object.keys(subjects).map(s => `<option value="${s}">${subjects[s].name}</option>`).join('')} </select> </div> <div class="p-3 bg-slate-50 rounded-xl border border-slate-100"> <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1">Bis wann</label> <input id="t-date" type="date" class="w-full bg-transparent font-bold focus:outline-none text-sm"> </div> </div> <textarea id="t-desc" placeholder="Was ist zu tun?..." class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl mb-4 h-20 focus:ring-2 focus:ring-blue-500 outline-none text-sm"></textarea> <button onclick="addTask()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all uppercase tracking-widest text-xs">Aufgabe zuweisen</button> </div> <div class="card p-8 bg-slate-900 text-white border-none shadow-2xl"> <h3 class="font-bold text-lg mb-6">👥 Klassenliste</h3> <div class="space-y-2 mb-6 max-h-48 overflow-y-auto pr-2 custom-scrollbar"> ${students.length === 0 ? '<p class="text-slate-500 text-xs italic">Noch keine Schüler erfasst.</p>' : students.map((s, i) => { const doneCount = tasks.filter(t => t.who === s && t.status === 'done').length; const totalCount = tasks.filter(t => (t.who === s || t.who === 'Ganze Klasse')).length; return ` <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl border border-white/10"> <div class="flex flex-col"> <span class="text-sm font-medium">${s}</span> <span class="text-[9px] text-slate-500 font-bold uppercase">${doneCount}/${totalCount} Erledigt</span> </div> <button onclick="removeStudent(${i})" class="text-red-400 hover:text-red-300">✕</button> </div> `; }).join('')} </div> <div class="flex gap-2 mb-4"> <input id="new-s" type="text" placeholder="Name..." class="flex-1 bg-white/10 border border-white/20 p-3 rounded-xl text-sm focus:outline-none focus:border-blue-400"> <button onclick="addStudent()" class="bg-blue-600 px-4 py-3 rounded-xl text-xs font-bold uppercase">Add</button> </div> <button onclick="importTxt()" class="w-full py-3 bg-white/10 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-white/20 transition-all">📥 Liste importieren (.txt)</button> </div> </div> <div class="card overflow-hidden"> <div class="p-6 bg-slate-50 border-b border-slate-200"> <h3 class="font-bold text-slate-700 uppercase tracking-widest text-[10px]">Aktuelle Aufgabenliste</h3> </div> <table class="w-full text-left"> <tbody class="divide-y divide-slate-100"> ${tasks.length === 0 ? '<tr><td class="p-12 text-center text-slate-400">Keine Aufgaben in der Liste.</td></tr>' : tasks.map((t, i) => ` <tr class="hover:bg-slate-50/50 transition-colors"> <td class="p-6"> <span class="badge" style="background-color: ${subjects[t.subject]?.color}">${t.subject}</span> </td> <td class="p-6 font-bold text-sm text-slate-700">${t.who}</td> <td class="p-6 text-sm text-slate-600">${t.desc}</td> <td class="p-6 text-sm text-slate-500 font-bold">${t.date}</td> <td class="p-6 text-right"> <button onclick="tasks.splice(${i},1);saveData()" class="text-slate-300 hover:text-red-500 text-xl transition-colors">🗑️</button> </td> </tr> `).join('')} </tbody> </table> </div> ${renderLegend()} `; } function toggleTask(idx) { tasks[idx].status = tasks[idx].status === 'done' ? 'open' : 'done'; saveData(); } function addTask() { const who = document.getElementById('t-who').value; const subject = document.getElementById('t-subject').value; const desc = document.getElementById('t-desc').value.trim(); let date = document.getElementById('t-date').value; if (!desc) return alert("Bitte eine Beschreibung eingeben."); tasks.push({ who, subject, desc, date: date ? new Date(date).toLocaleDateString('de-CH') : '-', status: 'open' }); document.getElementById('t-desc').value = ''; saveData(); } function addStudent() { const name = document.getElementById('new-s').value.trim(); if (name && !students.includes(name)) { students.push(name); document.getElementById('new-s').value = ''; saveData(); } } function removeStudent(idx) { if(confirm("Schüler entfernen?")) { students.splice(idx, 1); saveData(); } } function importTxt() { const input = document.createElement('input'); input.type = 'file'; input.accept = '.txt'; input.onchange = e => { const reader = new FileReader(); reader.onload = ev => { const names = ev.target.result.split(/[\n,]+/).map(n => n.trim()).filter(n => n); students = [...new Set([...students, ...names])]; saveData(); }; reader.readAsText(e.target.files[0]); }; input.click(); } </script> </body> </html> ```
