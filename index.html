```html <!DOCTYPE html> <html lang="de"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Döltschi | Digitaler Aufgabenplaner</title> <script src="https://cdn.tailwindcss.com"></script> <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outline" rel="stylesheet"> <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script> <style> @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap'); body { font-family: 'Inter', sans-serif; background-color: #f8fafc; } .dot-pattern { background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 20px 20px; } .no-print { display: block; } @media print { .no-print { display: none !important; } body { background: white !important; } .dot-pattern { background: none !important; } } .view-section { display: none; } .view-section.active { display: block; } </style> </head> <body class="dot-pattern min-h-screen text-slate-800 pb-20"> <!-- Header --> <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 no-print"> <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between"> <div class="flex items-center gap-3"> <span class="text-2xl font-extrabold tracking-tight text-blue-600">Döltschi</span> </div> <div class="flex bg-slate-100 p-1 rounded-xl"> <button onclick="setMode('student')" id="btn-student" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 bg-blue-600 text-white shadow-sm"> <span class="material-icons-outline text-sm">person_outline</span> Schüler-Ansicht </button> <button onclick="setMode('teacher')" id="btn-teacher" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-600 hover:bg-slate-200"> <span class="material-icons-outline text-sm">lock_outline</span> Lehrer-Modus </button> </div> </div> </header> <main class="max-w-6xl mx-auto px-6 mt-12"> <!-- Teacher View --> <div id="teacher-view" class="view-section"> <div class="flex justify-between items-center mb-8"> <h2 class="text-4xl font-black text-slate-900">Lehrer-Dashboard</h2> <button onclick="showPrintView()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 hover:bg-blue-700 transition-all shadow-lg shadow-blue-100"> <span class="material-icons-outline">print</span> Alle Eltern-Codes drucken </button> </div> <!-- Dashboard Content ... --> <div class="bg-white p-10 rounded-[32px] border-2 border-slate-100 shadow-xl mb-12"> <p class="text-slate-500 italic text-center py-10">Hier werden Ihre Klassen und Schüler verwaltet.</p> </div> </div> <!-- Print View (Hidden by default) --> <div id="print-view" class="view-section"> <nav class="flex justify-between items-center mb-10 no-print"> <button onclick="setMode('teacher')" class="text-blue-600 hover:text-blue-700 font-bold flex items-center gap-2 group transition-all"> <span class="material-icons-outline text-lg group-hover:-translate-x-1 transition-transform">arrow_back</span> Zurück zum Dashboard </button> <button onclick="window.print()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold flex items-center gap-2"> <span class="material-icons-outline">print</span> Jetzt drucken </button> </nav> <div class="bg-white p-12 rounded-3xl shadow-sm border border-slate-100 print:shadow-none print:border-none"> <div class="flex justify-between items-end border-b-4 border-blue-600 pb-6 mb-10"> <div> <p class="text-blue-600 font-bold uppercase tracking-widest text-xs mb-1">Wer – Was – Bis wann</p> <h1 class="text-4xl font-black text-slate-900">Eltern-Zugänge</h1> </div> <div class="text-right text-slate-400 font-bold text-sm"> Datum: <span id="print-date">--.--.----</span> </div> </div> <div id="qr-grid" class="grid grid-cols-2 gap-8"> <!-- QR Cards are injected here --> </div> </div> </div> </main> <script> let currentMode = 'student'; function setMode(mode) { if (mode === 'teacher') { const pw = prompt("Passwort für Lehrer-Modus:"); if (pw !== 'lehrer123') return; } currentMode = mode; updateUI(); } function showPrintView() { document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active')); document.getElementById('print-view').classList.add('active'); document.getElementById('print-date').innerText = new Date().toLocaleDateString('de-CH'); renderQRGrid(); } function updateUI() { document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active')); const btnS = document.getElementById('btn-student'); const btnT = document.getElementById('btn-teacher'); btnS.className = currentMode === 'student' ? 'flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold transition-all bg-blue-600 text-white shadow-sm' : 'flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold transition-all text-slate-600 hover:bg-slate-200'; btnT.className = currentMode === 'teacher' ? 'flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold transition-all bg-blue-600 text-white shadow-sm' : 'flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold transition-all text-slate-600 hover:bg-slate-200'; if (currentMode === 'teacher') { document.getElementById('teacher-view').classList.add('active'); } else { // Student view logic ... } } function renderQRGrid() { const grid = document.getElementById('qr-grid'); const demoStudents = ['Lena Meier', 'Jonas Weber', 'Sophie Fischer', 'Lukas Fischer']; grid.innerHTML = demoStudents.map(name => ` <div class="border-2 border-slate-200 rounded-2xl p-6 flex flex-col items-center"> <h3 class="font-bold text-lg mb-2">${name}</h3> <div class="bg-slate-100 w-32 h-32 rounded-xl flex items-center justify-center mb-4"> <span class="material-icons-outline text-slate-300 text-4xl">qr_code_2</span> </div> <p class="text-[10px] text-slate-400 text-center uppercase font-bold tracking-wider">Scannen für aktuelle Hausaufgaben</p> </div> `).join(''); } window.onload = updateUI; </script> </body> </html> ```
