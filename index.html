 <!DOCTYPE html> <html lang="de"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Döltschi | Digitaler Aufgabenplaner</title> <script src="https://cdn.tailwindcss.com"></script> <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outline" rel="stylesheet"> <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script> <!-- Firebase SDKs --> <script type="module"> import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"; import { getFirestore, doc, setDoc, onSnapshot, updateDoc, collection, query, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"; // --- DEINE FIREBASE KONFIGURATION --- const firebaseConfig = { apiKey: "AIzaSyC-...", authDomain: "doeltschi-...", projectId: "doeltschi-...", storageBucket: "doeltschi-...", messagingSenderId: "...", appId: "..." }; const app = initializeApp(firebaseConfig); const db = getFirestore(app); // --- APP LOGIK --- let currentMode = 'student'; let selectedStudent = null; let students = []; let tasks = []; let parentalConfirmations = {}; const subjects = { 'DE': { name: 'DEUTSCH', color: '#ef4444' }, 'MA': { name: 'MATHEMATIK', color: '#3b82f6' }, 'E': { name: 'ENGLISCH', color: '#eab308' }, 'F': { name: 'FRANZÖSISCH', color: '#22c55e' }, 'RZG': { name: 'RZG', color: '#f97316' }, 'NT': { name: 'NT', color: '#06b6d4' }, 'MU': { name: 'MUSIK', color: '#a855f7' }, 'BS': { name: 'SPORT', color: '#d97706' }, 'MI': { name: 'MEDIEN', color: '#64748b' }, 'WAH': { name: 'WAH', color: '#f43f5e' } }; // UI Initialisierung & Synchronisation async function init() { // Echtzeit-Sync der Schülerliste onSnapshot(doc(db, "config", "classlist"), (doc) => { if (doc.exists()) { students = doc.data().names || []; renderStudentSelectors(); } }); // Echtzeit-Sync der Aufgaben onSnapshot(collection(db, "tasks"), (snapshot) => { tasks = snapshot.docs.map(d => ({ id: d.id, ...d.data() })); if (selectedStudent) renderTasks(); if (currentMode === 'teacher') renderTeacherDashboard(); }); // Echtzeit-Sync der Bestätigungen onSnapshot(collection(db, "confirmations"), (snapshot) => { parentalConfirmations = {}; snapshot.docs.forEach(d => parentalConfirmations[d.id] = d.data()); if (selectedStudent) renderTasks(); if (currentMode === 'teacher') renderTeacherDashboard(); }); updateWeekInfo(); renderLegend(); } window.setMode = (mode) => { if (mode === 'teacher') { const pw = prompt("Passwort für Lehrer-Bereich:"); if (pw !== 'lehrer123') return; currentMode = 'teacher'; } else { currentMode = 'student'; selectedStudent = null; } updateUI(); }; function updateUI() { document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden')); if (currentMode === 'teacher') { document.getElementById('teacher-view').classList.remove('hidden'); renderTeacherDashboard(); } else if (selectedStudent) { document.getElementById('planer-view').classList.remove('hidden'); renderTasks(); } else { document.getElementById('start-view').classList.remove('hidden'); } } window.selectStudent = (name) => { if (!name) return; selectedStudent = name; updateUI(); }; // Aufgaben Rendern mit Filter (Ganze Klasse ODER individueller Name) function renderTasks() { const container = document.getElementById('task-container'); const isConfirmed = parentalConfirmations[selectedStudent]?.confirmed || false; // Filter: Nur Aufgaben für "Ganze Klasse" oder den spezifischen Schüler const visibleTasks = tasks.filter(t => t.who === 'all' || t.who === selectedStudent); if (visibleTasks.length === 0) { container.innerHTML = '<div class="p-12 text-center text-slate-400 bg-white rounded-3xl border-2 border-dashed border-slate-100">Keine Aufgaben für dich gefunden.</div>'; } else { container.innerHTML = visibleTasks.map(t => { const status = t.completedBy?.[selectedStudent] ? 'ERLEDIGT' : 'OFFEN'; return ` <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center ${isConfirmed ? 'opacity-75' : ''}"> <div class="flex items-center gap-4"> <span class="w-3 h-3 rounded-full" style="background-color: ${subjects[t.subject]?.color}"></span> <div> <p class="font-bold text-lg">${t.desc}</p> <p class="text-xs text-slate-400 uppercase font-bold">${t.who === 'all' ? 'Ganze Klasse' : 'Persönlich'}</p> </div> </div> <button onclick="toggleTask('${t.id}')" ${isConfirmed ? 'disabled' : ''} class="px-4 py-2 rounded-full text-xs font-black transition-all ${status === 'ERLEDIGT' ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-500'}"> ${status} </button> </div> `; }).join(''); } // Bestätigungs-Card const confirmBox = document.getElementById('parent-confirm-box'); confirmBox.innerHTML = ` <div class="border-2 border-dashed border-blue-200 rounded-3xl p-8 bg-blue-50/30 text-center"> <h3 class="text-xl font-bold mb-4">Bestätigung der Eltern</h3> ${isConfirmed ? `<div class="text-green-600 font-bold flex flex-col items-center gap-2"> <span class="material-icons-outline text-4xl">verified</span> Gesehen am ${parentalConfirmations[selectedStudent].date} <p class="text-xs text-slate-400 mt-2">(Ansicht gesperrt)</p> </div>` : `<button onclick="confirmParents()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:scale-105 transition-transform">Als Eltern bestätigen</button>` } </div> `; } window.toggleTask = async (taskId) => { const task = tasks.find(t => t.id === taskId); const currentStatus = task.completedBy?.[selectedStudent] || false; const newMap = { ...(task.completedBy || {}), [selectedStudent]: !currentStatus }; await updateDoc(doc(db, "tasks", taskId), { completedBy: newMap }); }; window.confirmParents = async () => { const date = new Date().toLocaleDateString('de-CH'); await setDoc(doc(db, "confirmations", selectedStudent), { confirmed: true, date: date }); }; // Lehrer Funktionen window.addTask = async () => { const desc = document.getElementById('task-desc').value; const who = document.getElementById('task-who').value; const sub = document.getElementById('task-sub').value; const date = document.getElementById('task-date').value; if (!desc || !date) return; await setDoc(doc(collection(db, "tasks")), { desc, who, subject: sub, date, completedBy: {} }); document.getElementById('task-desc').value = ''; }; window.resetConfirm = async (name) => { await deleteDoc(doc(db, "confirmations", name)); }; function renderStudentSelectors() { const sel = document.getElementById('student-selector'); sel.innerHTML = '<option value="">Wähle deinen Namen...</option>' + students.map(s => `<option value="${s}">${s}</option>`).join(''); const who = document.getElementById('task-who'); if (who) who.innerHTML = '<option value="all">Ganze Klasse</option>' + students.map(s => `<option value="${s}">${s}</option>`).join(''); } function renderTeacherDashboard() { // ... (Dashboard Rendering Logik analog zu den Vorversionen mit Cloud-Anbindung) } function updateWeekInfo() { const curr = new Date(); const first = curr.getDate() - curr.getDay() + 1; const monday = new Date(curr.setDate(first)).toLocaleDateString('de-CH'); document.getElementById('week-display').innerText = `Woche ${Math.ceil(new Date().getDate() / 7)}`; document.getElementById('date-range').innerText = monday + " – " + new Date(curr.setDate(first + 4)).toLocaleDateString('de-CH'); } function renderLegend() { document.getElementById('legend').innerHTML = Object.entries(subjects).map(([k,v]) => ` <div class="flex items-center gap-2 bg-white px-3 py-1 rounded-full border border-slate-100 text-[10px] font-bold"> <span class="w-2 h-2 rounded-full" style="background-color: ${v.color}"></span> ${v.name} </div>`).join(''); } init(); </script> <style> @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap'); body { font-family: 'Inter', sans-serif; background-color: #f8fafc; } .dot-pattern { background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 20px 20px; } </style> </head> <body class="dot-pattern min-h-screen pb-20"> <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 p-4"> <div class="max-w-4xl mx-auto flex justify-between items-center"> <h1 class="text-2xl font-black text-blue-600">Döltschi</h1> <div class="flex bg-slate-100 p-1 rounded-xl"> <button onclick="setMode('student')" class="px-4 py-2 rounded-lg text-sm font-bold bg-blue-600 text-white">Schüler</button> <button onclick="setMode('teacher')" class="px-4 py-2 rounded-lg text-sm font-bold text-slate-500">Lehrer</button> </div> </div> </header> <main class="max-w-4xl mx-auto mt-12 px-4"> <!-- Start --> <div id="start-view" class="view-section text-center"> <h2 class="text-5xl font-black mb-8 italic">Wer bist du?</h2> <select id="student-selector" onchange="selectStudent(this.value)" class="w-full max-w-md p-4 text-xl rounded-2xl border-2 border-slate-200 shadow-sm outline-none focus:border-blue-500 mb-12"></select> <!-- QR Section hier einfügen --> </div> <!-- Planer --> <div id="planer-view" class="view-section hidden"> <div class="flex justify-between items-end mb-12"> <h2 id="user-name" class="text-4xl font-black">Planer</h2> <div class="text-right"> <p id="week-display" class="text-3xl font-black text-slate-300">Woche</p> <p id="date-range" class="text-xs font-bold text-slate-400"></p> </div> </div> <div id="task-container" class="space-y-4 mb-12"></div> <div id="parent-confirm-box"></div> </div> <!-- Lehrer Dashboard --> <div id="teacher-view" class="view-section hidden"> <!-- Lehrer Dashboard Content --> </div> <div id="legend" class="mt-20 flex flex-wrap gap-2 justify-center"></div> </main> </body> </html> ```
