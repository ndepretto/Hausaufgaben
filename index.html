<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>doeltschi | Digitaler Aufgabenplaner Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outline" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, doc, onSnapshot, setDoc, updateDoc, arrayUnion, arrayRemove, collection, addDoc, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      // --- DEINE FIREBASE KONFIGURATION ---
      const firebaseConfig = {
        apiKey: "AIzaSyCeaYiA1v8aKz27LPlGoci3XIaD-2fWbIo",
        authDomain: "doeltschi-hausaufgabenplaner.firebaseapp.com",
        projectId: "doeltschi-hausaufgabenplaner",
        storageBucket: "doeltschi-hausaufgabenplaner.firebasestorage.app",
        messagingSenderId: "741131007424",
        appId: "1:741131007424:web:04427f839b7eb86aa9c425",
        measurementId: "G-C6GTQJ8C1D"
      };

      // Initialisierung
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // --- APP LOGIK ---
      let students = [];
      let tasks = [];
      let currentStudent = localStorage.getItem('doeltschi_user') || null;
      let currentMode = 'student';

      const subjects = {
          'DE': { name: 'DEUTSCH', color: '#ef4444' },
          'MA': { name: 'MATHEMATIK', color: '#3b82f6' },
          'E': { name: 'ENGLISCH', color: '#eab308' },
          'F': { name: 'FRANZÖSISCH', color: '#22c55e' },
          'RZG': { name: 'RZG', color: '#f97316' },
          'NT': { name: 'NT', color: '#06b6d4' },
          'MU': { name: 'MUSIK', color: '#a855f7' },
          'BS': { name: 'SPORT', color: '#d97706' },
          'MI': { name: 'MEDIEN', color: '#64748b' },
          'WAH': { name: 'WAH', color: '#f43f5e' }
      };

      // Live-Sync: Schülerliste
      onSnapshot(doc(db, "config", "classlist"), (doc) => {
          if (doc.exists()) {
              students = doc.data().names || [];
              renderSelectors();
              if (currentMode === 'teacher') renderTeacherDashboard();
          }
      });

      // Live-Sync: Aufgaben
      const tasksQuery = query(collection(db, "tasks"), orderBy("createdAt", "desc"));
      onSnapshot(tasksQuery, (snapshot) => {
          tasks = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          renderTasks();
          if (currentMode === 'teacher') renderTeacherDashboard();
      });

      // Funktionen
      window.selectStudent = (val) => {
          if (!val) return;
          currentStudent = val;
          localStorage.setItem('doeltschi_user', val);
          updateUI();
      };

      window.setMode = (mode) => {
          if (mode === 'teacher') {
              const pw = prompt("Passwort für Lehrer-Modus:");
              if (pw !== 'lehrer123') return;
              currentMode = 'teacher';
          } else {
              currentMode = 'student';
          }
          updateUI();
      };

      window.addTask = async () => {
          const desc = document.getElementById('task-desc').value;
          const sub = document.getElementById('task-subject').value;
          const who = document.getElementById('task-who').value;
          if (!desc) return;
          await addDoc(collection(db, "tasks"), {
              task: desc,
              subject: sub,
              who: who,
              done: [],
              confirmed: false,
              createdAt: Date.now()
          });
          document.getElementById('task-desc').value = '';
      };

      window.toggleTask = async (taskId, isDone) => {
          if (!currentStudent) return;
          const taskRef = doc(db, "tasks", taskId);
          if (isDone) {
              await updateDoc(taskRef, { done: arrayRemove(currentStudent) });
          } else {
              await updateDoc(taskRef, { done: arrayUnion(currentStudent) });
          }
      };

      window.updateClassList = async () => {
          const input = document.getElementById('class-input').value;
          const names = input.split(/[,\n]/).map(n => n.trim()).filter(n => n.length > 0);
          await setDoc(doc(db, "config", "classlist"), { names });
          alert("Liste in Cloud gespeichert!");
      };

      function updateUI() {
          document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
          if (currentMode === 'teacher') {
              document.getElementById('teacher-view').classList.remove('hidden');
              renderTeacherDashboard();
          } else if (currentStudent) {
              document.getElementById('planer-view').classList.remove('hidden');
              document.getElementById('display-name').innerText = currentStudent;
          } else {
              document.getElementById('start-view').classList.remove('hidden');
              generateQRCode();
          }
      }

      function renderSelectors() {
          const sel = document.getElementById('student-selector');
          const tSel = document.getElementById('task-who');
          if (!sel) return;
          sel.innerHTML = '<option value="">Wähle deinen Namen...</option>';
          tSel.innerHTML = '<option value="all">Ganze Klasse</option>';
          students.forEach(s => {
              sel.innerHTML += `<option value="${s}">${s}</option>`;
              tSel.innerHTML += `<option value="${s}">${s}</option>`;
          });
      }

      function renderTasks() {
          const container = document.getElementById('task-container');
          if (!container) return;
          const myTasks = tasks.filter(t => t.who === 'all' || t.who === currentStudent);
          if (myTasks.length === 0) {
              container.innerHTML = '<div class="text-center py-20 text-slate-300 font-bold border-2 border-dashed border-slate-100 rounded-[32px]">Keine Aufgaben</div>';
              return;
          }
          container.innerHTML = myTasks.map(t => {
              const isDone = t.done && t.done.includes(currentStudent);
              return `
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between mb-4">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" onchange="toggleTask('${t.id}', ${isDone})" ${isDone ? 'checked' : ''} class="w-6 h-6 rounded-lg text-blue-600 cursor-pointer">
                        <div>
                            <span class="text-[10px] font-black text-white px-2 py-0.5 rounded-full" style="background:${subjects[t.subject]?.color}">${t.subject}</span>
                            <p class="font-bold ${isDone ? 'line-through text-slate-300' : ''}">${t.task}</p>
                        </div>
                    </div>
                </div>
              `;
          }).join('');
      }

      function renderTeacherDashboard() {
          const stats = document.getElementById('stats-body');
          if (!stats) return;
          stats.innerHTML = students.map(s => {
              const studentTasks = tasks.filter(t => t.who === 'all' || t.who === s);
              const doneCount = studentTasks.filter(t => t.done && t.done.includes(s)).length;
              return `
                <tr class="border-b border-slate-50">
                    <td class="py-4 font-bold text-slate-700">${s}</td>
                    <td class="py-4 text-xs font-bold text-slate-400">${doneCount}/${studentTasks.length} erledigt</td>
                    <td class="py-4 text-right">
                        <button class="text-blue-600 text-[10px] font-black uppercase">Details</button>
                    </td>
                </tr>
              `;
          }).join('');
          document.getElementById('class-input').value = students.join('\n');
      }

      function generateQRCode() {
          const container = document.getElementById('qrcode');
          if (!container) return;
          container.innerHTML = "";
          new QRCode(container, { text: window.location.href, width: 200, height: 200 });
      }

      window.onload = () => {
          const d = new Date();
          const oneJan = new Date(d.getFullYear(),0,1);
          const week = Math.ceil((((d - oneJan) / 86400000) + oneJan.getDay() + 1) / 7);
          document.getElementById('week-label').innerText = `Woche ${week}`;
          updateUI();
      };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .dot-pattern { background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 20px 20px; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="dot-pattern min-h-screen text-slate-800 pb-20">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 no-print">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <span class="text-2xl font-extrabold text-blue-600">doeltschi</span>
            <div class="flex bg-slate-100 p-1 rounded-xl">
                <button onclick="setMode('student')" class="px-4 py-2 rounded-lg text-xs font-bold transition-all bg-blue-600 text-white shadow-sm">Schüler-Ansicht</button>
                <button onclick="setMode('teacher')" class="px-4 py-2 rounded-lg text-xs font-bold transition-all text-slate-600 hover:bg-slate-200">Lehrer-Modus</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 mt-12">
        <!-- Start View -->
        <div id="start-view" class="view-section text-center">
            <h1 class="text-5xl font-black mb-4">Wer bist du?</h1>
            <select id="student-selector" onchange="selectStudent(this.value)" class="max-w-sm w-full bg-white border-2 border-slate-200 rounded-2xl px-6 py-4 text-xl font-bold mb-12 shadow-sm focus:border-blue-500 outline-none cursor-pointer"></select>
            <div class="bg-white p-12 rounded-[48px] border-2 border-slate-100 shadow-2xl flex flex-col items-center max-w-sm mx-auto">
                <h3 class="text-2xl font-bold mb-4">QR-Code scannen</h3>
                <div id="qrcode" class="bg-white p-4 rounded-2xl mb-4"></div>
                <p class="text-xs text-slate-400 font-bold uppercase">Einmal scannen, immer aktuell.</p>
            </div>
        </div>

        <!-- Planer View -->
        <div id="planer-view" class="view-section hidden">
            <div class="flex justify-between items-end mb-12">
                <h2 id="display-name" class="text-5xl font-black text-slate-900">Name</h2>
                <div id="week-label" class="text-3xl font-black text-slate-200">Woche --</div>
            </div>
            <div id="task-container"></div>
        </div>

        <!-- Teacher View -->
        <div id="teacher-view" class="view-section hidden">
            <h2 class="text-3xl font-black mb-8">Lehrer-Dashboard</h2>
            <div class="grid gap-8">
                <div class="bg-white p-8 rounded-[40px] border border-slate-100 shadow-lg">
                    <h3 class="font-bold mb-4 text-blue-600">Aufgabe zuteilen</h3>
                    <input type="text" id="task-desc" placeholder="Aufgabe..." class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-4 py-3 mb-3">
                    <div class="flex gap-2 mb-3">
                        <select id="task-who" class="flex-1 bg-slate-50 border border-slate-100 rounded-xl px-3 py-2"></select>
                        <select id="task-subject" class="flex-1 bg-slate-50 border border-slate-100 rounded-xl px-3 py-2">
                            <option value="DE">Deutsch</option><option value="MA">Mathe</option><option value="E">Englisch</option>
                            <option value="F">Französisch</option><option value="RZG">RZG</option><option value="NT">NT</option>
                            <option value="MU">Musik</option><option value="BS">Sport</option><option value="MI">Medien</option>
                            <option value="WAH">WAH</option>
                        </select>
                    </div>
                    <button onclick="addTask()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-2xl">Hinzufügen</button>
                </div>
                
                <div class="bg-white p-8 rounded-[40px] border border-slate-100 shadow-lg">
                    <h3 class="font-bold mb-4">Klassenliste verwalten</h3>
                    <textarea id="class-input" class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 mb-3" rows="3"></textarea>
                    <button onclick="updateClassList()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-2xl">Cloud-Liste aktualisieren</button>
                </div>

                <div class="bg-white p-8 rounded-[40px] shadow-lg">
                    <h3 class="font-bold mb-4">Fortschritt</h3>
                    <table class="w-full"><tbody id="stats-body"></tbody></table>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
