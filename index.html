<!DOCTYPE html> <html lang="de"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>doeltschi | Digitaler Aufgabenplaner</title> <script src="https://cdn.tailwindcss.com"></script> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"> <style> body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 0; } .container-custom { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; } .card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: all 0.2s; } .card:hover { border-color: #cbd5e1; } .nav-pill { padding: 0.6rem 1.2rem; border-radius: 9999px; font-weight: 600; font-size: 0.875rem; display: flex; items-center: center; gap: 0.5rem; transition: all 0.2s; } .nav-pill-active { background-color: #007aff; color: white; } .nav-pill-inactive { color: #64748b; } .nav-pill-inactive:hover { background-color: #f1f5f9; } .step-circle { width: 40px; height: 40px; border-radius: 50%; background: #eff6ff; color: #007aff; display: flex; align-items: center; justify-content: center; font-weight: 700; margin-bottom: 1rem; } @media print { .no-print { display: none !important; } } </style> </head> <body class="min-h-screen"> <!-- TOP NAVIGATION --> <header class="bg-white border-b border-slate-200 sticky top-0 z-50 no-print"> <div class="max-w-[1200px] mx-auto px-6 py-4 flex justify-between items-center"> <div class="flex items-center gap-2"> <h1 class="text-2xl font-bold text-slate-800 tracking-tight">doeltschi</h1> <span class="px-2 py-0.5 bg-slate-100 text-[10px] font-bold text-slate-500 rounded uppercase tracking-widest">Lokal Aktiv</span> </div> <nav class="flex gap-2"> <button onclick="setMode('student')" id="btn-student" class="nav-pill nav-pill-active"> <span>👤</span> Schüler-Ansicht </button> <button onclick="setMode('teacher')" id="btn-teacher" class="nav-pill nav-pill-inactive"> <span>🔒</span> Lehrer-Modus </button> </nav> </div> </header> <main id="app" class="container-custom"> <!-- Inhalt wird per JS geladen --> </main> <script> const STORAGE_KEY = 'doeltschi_classic_stable_v12'; const PASSWORD = 'lehrer123'; let currentMode = 'student'; let selectedStudent = 'Alle'; let tasks = []; let students = []; window.addEventListener('DOMContentLoaded', () => { const saved = localStorage.getItem(STORAGE_KEY); if (saved) { const data = JSON.parse(saved); tasks = data.tasks || []; students = data.students || []; } render(); }); function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks, students })); render(); } function setMode(mode) { if (mode === 'teacher') { const pw = prompt("Lehrer-Passwort eingeben:"); if (pw !== PASSWORD) return alert("Falsches Passwort!"); } currentMode = mode; render(); } function render() { const app = document.getElementById('app'); document.getElementById('btn-student').className = `nav-pill ${currentMode === 'student' ? 'nav-pill-active' : 'nav-pill-inactive'}`; document.getElementById('btn-teacher').className = `nav-pill ${currentMode === 'teacher' ? 'nav-pill-active' : 'nav-pill-inactive'}`; if (currentMode === 'student') renderStudentView(app); else renderTeacherView(app); } function renderStudentView(container) { let filtered = selectedStudent === 'Alle' ? tasks : tasks.filter(t => t.who === selectedStudent || t.who === 'Ganze Klasse'); container.innerHTML = ` <!-- STEPS --> <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-12 no-print"> <div class="card p-6 text-center"> <div class="step-circle mx-auto">1</div> <h4 class="font-bold text-sm mb-1">Erfassen</h4> <p class="text-xs text-slate-400 leading-relaxed">Lehrperson trägt Aufgaben online ein.</p> </div> <div class="card p-6 text-center"> <div class="step-circle mx-auto">2</div> <h4 class="font-bold text-sm mb-1">Erledigen</h4> <p class="text-xs text-slate-400 leading-relaxed">Du erledigst Aufgaben und hakst sie ab.</p> </div> <div class="card p-6 text-center"> <div class="step-circle mx-auto">3</div> <h4 class="font-bold text-sm mb-1">Bestätigen</h4> <p class="text-xs text-slate-400 leading-relaxed">Lass deine Eltern die Liste bestätigen.</p> </div> <div class="card p-6 border-dashed border-2 border-blue-200 bg-blue-50/30 text-center"> <div class="step-circle mx-auto bg-blue-600 text-white">4</div> <h4 class="font-bold text-sm mb-1">App nutzen</h4> <p class="text-xs text-slate-400 leading-relaxed">Als Web-App auf dem Homescreen sichern.</p> </div> </div> <!-- FILTER --> <div class="card p-6 mb-8 flex flex-col md:flex-row justify-between items-center gap-4 no-print"> <div> <h2 class="text-xl font-bold">Aufgabenliste</h2> <p class="text-xs text-slate-400">Aktuelle Woche: ${new Date().toLocaleDateString('de-CH')}</p> </div> <div class="flex items-center gap-3"> <span class="text-[10px] font-bold text-slate-400 uppercase">Wer bist du?</span> <select onchange="selectedStudent = this.value; render()" class="bg-slate-50 border border-slate-200 px-4 py-2 rounded-xl font-bold text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"> <option value="Alle">Alle anzeigen</option> ${students.map(s => `<option value="${s}" ${selectedStudent === s ? 'selected' : ''}>${s}</option>`).join('')} </select> </div> </div> <!-- LIST --> <div class="card overflow-hidden mb-8"> <table class="w-full text-left border-collapse"> <thead> <tr class="bg-slate-50 border-b border-slate-100 text-[10px] font-bold text-slate-400 uppercase tracking-widest"> <th class="p-4">Status</th> <th class="p-4">Wer</th> <th class="p-4">Aufgabe</th> <th class="p-4">Bis wann</th> <th class="p-4 text-right">Aktion</th> </tr> </thead> <tbody class="divide-y divide-slate-100"> ${filtered.length === 0 ? `<tr><td colspan="5" class="p-12 text-center text-slate-400 italic">Keine Aufgaben vorhanden.</td></tr>` : filtered.map((t, i) => ` <tr class="hover:bg-slate-50/50 transition-colors"> <td class="p-4"><div class="w-3 h-3 rounded-full ${t.status === 'done' ? 'bg-green-500' : 'bg-orange-400'}"></div></td> <td class="p-4 font-bold text-slate-700">${t.who}</td> <td class="p-4 text-slate-600">${t.desc}</td> <td class="p-4 text-slate-500 font-medium">${t.date}</td> <td class="p-4 text-right"> <button onclick="toggleTask(${tasks.indexOf(t)})" class="px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-all ${t.status === 'done' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-600'}"> ${t.status === 'done' ? '✓ Erledigt' : 'Offen'} </button> </td> </tr> `).join('')} </tbody> </table> </div> <!-- PARENT CONFIRMATION --> <div class="card p-8 border-2 border-blue-500 border-dashed bg-blue-50/10 no-print"> <h3 class="font-bold text-blue-600 mb-6 flex items-center gap-2">🛡️ Bestätigung der Eltern</h3> <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end"> <div> <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Datum:</label> <input type="text" value="${new Date().toLocaleDateString('de-CH')}" readonly class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm font-medium"> </div> <div> <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Unterschrift (Name):</label> <input type="text" placeholder="Vorname Nachname" class="w-full bg-white border border-slate-200 p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none"> </div> <button class="bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">Gesehen ✓</button> </div> </div> <footer class="mt-12 text-center text-[10px] text-slate-400 no-print"> <div class="flex justify-center gap-4 mb-4"> <a href="#" class="hover:underline">Datenschutz</a> <a href="#" class="hover:underline">Impressum</a> <a href="#" class="hover:underline">Hilfe</a> </div> <p>© 2024 Digitaler Planer | Version 12 - Klassik Fix</p> </footer> `; } function renderTeacherView(container) { container.innerHTML = ` <div class="flex justify-between items-center mb-8"> <h2 class="text-3xl font-extrabold tracking-tight">Lehrer Dashboard</h2> <div class="flex gap-2"> <button onclick="window.print()" class="px-5 py-2.5 bg-white border rounded-xl font-bold text-sm shadow-sm hover:bg-slate-50">🖨️ Drucken / PDF</button> <button onclick="if(confirm('Alles löschen?')){tasks=[];saveData();}" class="px-5 py-2.5 bg-red-50 text-red-600 border border-red-100 rounded-xl font-bold text-sm hover:bg-red-100">🗑️ Liste leeren</button> </div> </div> <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12"> <div class="lg:col-span-2 card p-8"> <h3 class="font-bold text-lg mb-6">➕ Neue Aufgabe zuteilen</h3> <div class="grid grid-cols-2 gap-4 mb-4"> <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100"> <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-widest">Zuweisen an:</label> <select id="t-who" class="w-full bg-transparent font-bold focus:outline-none"> <option value="Ganze Klasse">Ganze Klasse</option> ${students.map(s => `<option value="${s}">${s}</option>`).join('')} </select> </div> <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100"> <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-widest">Fällig am:</label> <input id="t-date" type="date" class="w-full bg-transparent font-bold focus:outline-none"> </div> </div> <textarea id="t-desc" placeholder="Beschreibung der Aufgabe..." class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl mb-4 h-24 focus:ring-2 focus:ring-blue-500 outline-none"></textarea> <button onclick="addTask()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all">Aufgabe jetzt zuweisen</button> </div> <div class="card p-8 bg-slate-900 text-white border-none shadow-2xl"> <h3 class="font-bold text-lg mb-6">👥 Klassenliste</h3> <div class="space-y-2 mb-6 max-h-48 overflow-y-auto pr-2 custom-scrollbar"> ${students.length === 0 ? '<p class="text-slate-500 text-xs italic">Noch keine Schüler erfasst.</p>' : students.map((s, i) => { const doneCount = tasks.filter(t => t.who === s && t.status === 'done').length; const totalCount = tasks.filter(t => t.who === s || t.who === 'Ganze Klasse').length; return ` <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl border border-white/10"> <div class="flex flex-col"> <span class="text-sm font-medium">${s}</span> <span class="text-[9px] text-slate-500">${doneCount}/${totalCount} erledigt</span> </div> <button onclick="removeStudent(${i})" class="text-red-400 hover:text-red-300">✕</button> </div> `; }).join('')} </div> <div class="flex gap-2 mb-4"> <input id="new-s" type="text" placeholder="Name..." class="flex-1 bg-white/10 border border-white/20 p-2.5 rounded-xl text-sm focus:outline-none"> <button onclick="addStudent()" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold">Add</button> </div> <button onclick="importTxt()" class="w-full py-3 bg-white/10 rounded-xl text-[9px] font-bold uppercase tracking-widest hover:bg-white/20">📥 Liste importieren (.txt)</button> </div> </div> <div class="card overflow-hidden"> <div class="p-6 bg-slate-50 border-b border-slate-200"> <h3 class="font-bold text-slate-700">Aktuelle Aufgaben</h3> </div> <table class="w-full text-left"> <tbody class="divide-y divide-slate-100"> ${tasks.length === 0 ? '<tr><td class="p-12 text-center text-slate-400">Keine Aufgaben in der Liste.</td></tr>' : tasks.map((t, i) => ` <tr class="hover:bg-slate-50/50"> <td class="p-5 font-bold text-sm text-slate-700">${t.who}</td> <td class="p-5 text-sm text-slate-600">${t.desc}</td> <td class="p-5 text-sm text-slate-400">${t.date}</td> <td class="p-5 text-right"><button onclick="tasks.splice(${i},1);saveData()" class="text-slate-300 hover:text-red-500 text-lg">🗑️</button></td> </tr> `).join('')} </tbody> </table> </div> `; } function toggleTask(idx) { tasks[idx].status = tasks[idx].status === 'done' ? 'open' : 'done'; saveData(); } function addTask() { const who = document.getElementById('t-who').value; const desc = document.getElementById('t-desc').value.trim(); let date = document.getElementById('t-date').value; if (!desc) return alert("Bitte eine Beschreibung eingeben."); tasks.push({ who, desc, date: date ? new Date(date).toLocaleDateString('de-CH') : '-', status: 'open' }); document.getElementById('t-desc').value = ''; saveData(); } function addStudent() { const name = document.getElementById('new-s').value.trim(); if (name && !students.includes(name)) { students.push(name); document.getElementById('new-s').value = ''; saveData(); } } function removeStudent(idx) { if(confirm("Schüler entfernen?")) { students.splice(idx, 1); saveData(); } } function importTxt() { const input = document.createElement('input'); input.type = 'file'; input.accept = '.txt'; input.onchange = e => { const reader = new FileReader(); reader.onload = ev => { const names = ev.target.result.split(/[\n,]+/).map(n => n.trim()).filter(n => n); students = [...new Set([...students, ...names])]; saveData(); }; reader.readAsText(e.target.files[0]); }; input.click(); } </script> </body> </html> ```
