<!DOCTYPE html> <html lang="de"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Döltschi | Digitales Aufgabenheft</title> <script src="https://cdn.tailwindcss.com"></script> <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outline" rel="stylesheet"> <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script> <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script> <style> @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap'); body { font-family: 'Inter', sans-serif; background-color: #f8fafc; } .dot-pattern { background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 20px 20px; } .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); } .no-wrap { white-space: nowrap; } @media print { .no-print { display: none !important; } } .view-section { display: none; } .view-section.active { display: block; } /* Ensure buttons don't wrap text */ .student-btn { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: fit-content; } </style> </head> <body class="dot-pattern min-h-screen text-slate-800 pb-20"> <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 no-print"> <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between"> <div class="flex items-center gap-3"> <span class="text-2xl font-extrabold tracking-tight text-blue-600">doeltschi</span> <div class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider flex items-center gap-1"> <span class="material-icons-outline text-sm">bolt</span> LOKAL AKTIV </div> </div> <div class="flex gap-4"> <button onclick="setMode('student')" id="btn-student" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 bg-blue-600 text-white shadow-sm"> <span class="material-icons-outline text-sm">person</span> Schüler-Ansicht </button> <button onclick="setMode('teacher')" id="btn-teacher" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-600 hover:bg-slate-200"> <span class="material-icons-outline text-sm">lock</span> Lehrer-Modus </button> <button onclick="showAnleitung()" class="text-slate-600 font-semibold text-sm hover:text-blue-600">Anleitung</button> </div> </div> </header> <main class="max-w-6xl mx-auto px-6 mt-12"> <!-- Start-View: Wer bist du? --> <div id="start-view" class="view-section active"> <div class="flex flex-col md:flex-row justify-between items-center gap-8 mb-16"> <div class="grid grid-cols-1 md:grid-cols-4 gap-6 w-full"> <div class="bg-blue-50 p-6 rounded-3xl text-center border-2 border-blue-100 relative opacity-40"> <div class="w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold mx-auto mb-4 text-xl shadow-lg shadow-blue-200">1</div> <p class="font-bold text-blue-900 uppercase text-xs tracking-widest">Name wählen</p> </div> <div class="bg-slate-50 p-6 rounded-3xl text-center border border-slate-100 opacity-40"> <div class="w-12 h-12 bg-slate-200 text-slate-400 rounded-full flex items-center justify-center font-bold mx-auto mb-4 text-xl">2</div> <p class="font-bold text-slate-400 uppercase text-xs tracking-widest">Aufgaben prüfen</p> </div> <div class="bg-slate-50 p-6 rounded-3xl text-center border border-slate-100 opacity-40"> <div class="w-12 h-12 bg-slate-200 text-slate-400 rounded-full flex items-center justify-center font-bold mx-auto mb-4 text-xl">3</div> <p class="font-bold text-slate-400 uppercase text-xs tracking-widest">Erledigen</p> </div> <div class="bg-slate-50 p-6 rounded-3xl text-center border border-slate-100 opacity-40"> <div class="w-12 h-12 bg-slate-200 text-slate-400 rounded-full flex items-center justify-center font-bold mx-auto mb-4 text-xl">4</div> <p class="font-bold text-slate-400 uppercase text-xs tracking-widest">Eltern zeigen</p> </div> </div> </div> <div class="text-center mb-12"> <p class="text-blue-600 font-bold uppercase text-xs tracking-widest mb-4 flex items-center justify-center gap-2"> <span class="material-icons-outline text-sm">person_search</span> Schüler auswählen </p> <div class="max-w-xl mx-auto flex flex-wrap justify-center gap-4" id="student-grid"> <!-- Student buttons will be injected here --> </div> </div> <div id="week-info" class="text-center"> <h2 id="week-display" class="text-[120px] font-black text-slate-900 leading-none tracking-tighter mb-2">Woche --</h2> <p id="date-range-display" class="text-xl font-bold text-slate-400 tracking-[0.2em] uppercase">--. --. ---- – --. --. ----</p> </div> </div> <!-- Planer-View (Student) --> <div id="planer-view" class="view-section"> <!-- Content for specific student --> </div> <!-- Lehrer-View --> <div id="teacher-view" class="view-section"> <div class="flex justify-between items-center mb-8"> <h2 class="text-4xl font-black text-slate-900">Lehrer-Dashboard</h2> <button onclick="deleteEntireClass()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-sm font-bold border border-red-100 hover:bg-red-600 hover:text-white transition-all">Klasse vollständig löschen</button> </div> <!-- Dashboard content --> </div> </main> <script> const STORAGE_KEY = 'doeltschi-v21-master'; let currentClass = 'Ganze Klasse'; let students = ['Lukas Müller 4b', 'Sophie Fischer 4b', 'Emma Weber 4b', 'Maximilian Schmidt 4b']; let tasks = []; let confirmations = {}; function init() { loadData(); updateWeekInfo(); renderStudentGrid(); updateUI(); } function loadData() { const saved = localStorage.getItem(STORAGE_KEY); if (saved) { const data = JSON.parse(saved); students = data.students || students; tasks = data.tasks || []; confirmations = data.confirmations || {}; } } function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ students, tasks, confirmations })); } function renderStudentGrid() { const grid = document.getElementById('student-grid'); grid.innerHTML = ''; // "Alle" Button const allBtn = document.createElement('button'); allBtn.className = 'bg-white border-2 border-slate-100 px-8 py-4 rounded-2xl text-xl font-bold shadow-sm hover:border-blue-500 hover:shadow-md transition-all student-btn no-wrap'; allBtn.innerText = 'Alle Schüler / Ganze Klasse'; allBtn.onclick = () => selectStudent('all'); grid.appendChild(allBtn); students.forEach(name => { const btn = document.createElement('button'); btn.className = 'bg-white border-2 border-slate-100 px-8 py-4 rounded-2xl text-xl font-bold shadow-sm hover:border-blue-500 hover:shadow-md transition-all student-btn no-wrap'; btn.innerText = name; btn.onclick = () => selectStudent(name); grid.appendChild(btn); }); } function selectStudent(name) { // Logik zum Anzeigen der Aufgaben für den gewählten Schüler console.log("Selected:", name); } function setMode(mode) { if (mode === 'teacher') { const pw = prompt("Passwort für Lehrer-Modus:"); if (pw !== 'lehrer123') return; } // Switch views... } function updateWeekInfo() { const now = new Date(); const startOfYear = new Date(now.getFullYear(), 0, 1); const pastDaysOfYear = (now - startOfYear) / 86400000; const weekNum = Math.ceil((pastDaysOfYear + startOfYear.getDay() + 1) / 7); const curr = new Date(); const monday = new Date(curr.setDate(curr.getDate() - curr.getDay() + 1)).toLocaleDateString('de-CH'); const friday = new Date(curr.setDate(curr.getDate() - curr.getDay() + 5)).toLocaleDateString('de-CH'); document.getElementById('week-display').innerText = `Woche ${weekNum}`; document.getElementById('date-range-display').innerText = `${monday} – ${friday}`; } window.onload = init; </script> </body> </html> ```
